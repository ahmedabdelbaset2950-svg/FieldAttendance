{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
    <h2 class="text-white mb-4"><i class="bi bi-gear-fill"></i> System Settings</h2>
    
    <div class="row">
        <!-- القائمة الجانبية للأقسام -->
        <div class="col-md-3">
            <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">
                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#account">Account</button>
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#system">System Info</button>
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#database">Backup/Database</button>
            </div>
        </div>

        <!-- محتوى الأقسام -->
        <div class="col-md-9">
            <div class="tab-content">
                <!-- قسم الحساب -->
                
<div class="tab-pane fade show active" id="account">
    <div class="card bg-dark text-white p-4 border-secondary">
        <h5 class="mb-3">Change Password</h5>
        <form action="{{ url_for('main.update_password') }}" method="POST">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control bg-dark text-white border-secondary" required>
            </div>
            <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
    </div>
</div>

                <!-- قسم النظام -->
                <!-- قسم النظام -->
<div class="tab-pane fade" id="system">
    <div class="card bg-dark text-white p-4 border-secondary">
        <h5 class="mb-3">Company Details</h5>
        <form action="{{ url_for('main.update_system') }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Company Name</label>
                <input type="text" name="company_name" class="form-control bg-dark text-white border-secondary" 
                       value="{{ setting.company_name if setting else 'Royal Wells Alliance' }}">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
        <hr class="border-secondary">
        <p class="text-secondary small">System Version: 1.0.0</p>
    </div>
</div>
                
                <!-- قسم قاعدة البيانات -->
<div class="tab-pane fade" id="database">
    <div class="card bg-dark text-white p-4 border-secondary">
        <h5 class="mb-3">Database Management</h5>
        <p class="text-secondary">Click below to download a backup of your current database.</p>
        <a href="{{ url_for('main.backup_db') }}" class="btn btn-success">
            <i class="bi bi-download"></i> Export Database (Backup)
        </a>
    </div>
</div>
        </div>
    </div>
</div>
{% endblock %}
