{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">
                <i class="bi bi-pencil-square text-warning"></i>
                Edit Engineer
            </h2>
            <p class="text-secondary mb-0">
                Update engineer information
            </p>
        </div>
        <a href="/engineers" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <form method="POST" enctype="multipart/form-data">
        <div class="card shadow">
            <div class="card-body">
                <!-- Current Profile Image and Upload Field -->
                <div class="row align-items-center mb-4 border-bottom pb-4">
                    <div class="col-auto">
                        <img src="{{ url_for('static', filename='profile_pics/' + engineer.profile_image) }}" 
                             class="rounded-circle border border-secondary shadow-sm" 
                             style="width: 90px; height: 90px; object-fit: cover;">
                    </div>
                    <div class="col">
                        <label class="form-label fw-bold">Change Profile Image</label>
                        <input type="file" name="profile_image" class="form-control" accept="image/*" style="max-width: 400px;">
                    </div>
                </div>

                <div class="row">
                    <!-- Employee ID -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Engineer Code</label>
                        <input type="text" name="employee_id" class="form-control" value="{{ engineer.employee_id }}" required>
                    </div>

                    <!-- Full Name -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-control" value="{{ engineer.full_name }}" required>
                    </div>

                    <!-- Phone -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ engineer.phone or '' }}">
                    </div>

                    <!-- Email -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ engineer.email or '' }}">
                    </div>

                    <!-- Company -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Company</label>
                        <input type="text" name="company" class="form-control" value="{{ engineer.company or '' }}">
                    </div>

                    <!-- Department -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Department</label>
                        <input type="text" name="department" class="form-control" value="{{ engineer.department or '' }}">
                    </div>

                    <!-- Position -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Position</label>
                        <input type="text" name="position" class="form-control" value="{{ engineer.position or '' }}">
                    </div>

                    <!-- Supervisor -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Supervisor</label>
                        <input type="text" name="supervisor" class="form-control" value="{{ engineer.supervisor or '' }}">
                    </div>

                    <!-- Field Name -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Field Name</label>
                        <input type="text" name="field_name" class="form-control" value="{{ engineer.field_name or '' }}">
                    </div>

                    <!-- Location -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" class="form-control" value="{{ engineer.location or '' }}">
                    </div>

                    <!-- Rotation -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Rotation</label>
                        <input type="text" name="rotation" class="form-control" placeholder="28/28" value="{{ engineer.rotation or '' }}">
                    </div>

                    <!-- Current Status -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Current Status</label>
                        <select name="current_status" class="form-select">
                            <option value="On Site" {% if engineer.current_status=="On Site" %}selected{% endif %}>On Site</option>
                            <option value="Off Site" {% if engineer.current_status=="Off Site" %}selected{% endif %}>Off Site</option>
                            <option value="Leave" {% if engineer.current_status=="Leave" %}selected{% endif %}>Leave</option>
                        </select>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-warning">
                        <i class="bi bi-check-circle-fill"></i> Update Engineer
                    </button>
                    <a href="/engineers" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancel
                    </a>
                </div>
            </div>
        </div>
    </form>
</div>
{% endblock %}
